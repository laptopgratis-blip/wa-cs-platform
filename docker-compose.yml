# Hulao — production stack: Next.js (di-routing oleh Traefik) + WA service internal.
# Asumsi:
#   - Traefik sudah jalan di host & punya network external "traefik-public"
#   - Resolver Let's Encrypt bernama "letsencrypt" di Traefik
#   - DNS hulao.id + www.hulao.id sudah point ke IP VPS (76.13.192.225)

services:
  postgres:
    # Postgres self-hosted — match major version dengan Supabase (17.x) supaya
    # SQL dump kompatibel dua arah. Alpine = image kecil & cepat.
    image: postgres:17-alpine
    container_name: hulao-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hulao
      POSTGRES_DB: hulao
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - hulao-postgres-data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    networks:
      # Hanya internal — JANGAN expose port 5432 ke host/public.
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hulao -d hulao"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hulao-nextjs
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # Override URL service WA — pakai container name di network internal.
      - WA_SERVICE_URL=http://wa-service:3001
    volumes:
      # Persist gambar bukti transfer & gambar LP supaya tidak hilang saat
      # container di-recreate. Mount langsung ke /app/public/uploads di image.
      - ./public/uploads:/app/public/uploads
    ports:
      - "3000:3000"
    networks:
      - traefik-public
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      wa-service:
        condition: service_started
    labels:
      - "traefik.enable=true"
      # Router HTTPS untuk hulao.id + www
      - "traefik.http.routers.hulao.rule=Host(`hulao.id`) || Host(`www.hulao.id`)"
      - "traefik.http.routers.hulao.entrypoints=websecure"
      - "traefik.http.routers.hulao.tls=true"
      - "traefik.http.routers.hulao.tls.certresolver=letsencrypt"
      - "traefik.http.services.hulao.loadbalancer.server.url=http://127.0.0.1:3000"
      # Redirect www → apex (preferensi SEO).
      - "traefik.http.middlewares.hulao-www-redirect.redirectregex.regex=^https://www\\.hulao\\.id/(.*)"
      - "traefik.http.middlewares.hulao-www-redirect.redirectregex.replacement=https://hulao.id/$$1"
      - "traefik.http.middlewares.hulao-www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.hulao.middlewares=hulao-www-redirect@docker"
      # Pakai network traefik-public eksplisit (multi-network safety).
      - "traefik.docker.network=traefik-public"

  wa-service:
    build:
      context: ./wa-service
      dockerfile: Dockerfile
    container_name: hulao-wa-service
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      # Persist Baileys credentials — kalau hilang user harus scan QR ulang.
      - ./wa-service/sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wa-socket.rule=Host(`hulao.id`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.wa-socket.entrypoints=websecure"
      - "traefik.http.routers.wa-socket.tls=true"
      - "traefik.http.routers.wa-socket.tls.certresolver=letsencrypt"
      - "traefik.http.services.wa-socket.loadbalancer.server.url=http://127.0.0.1:3001"
      - "traefik.docker.network=traefik-public"

  uploads-server:
    # Static file server untuk /uploads/* (foto produk, bukti transfer,
    # gambar LP, file knowledge). Priority 200 di Traefik supaya menang dari
    # router `hulao` (default priority ~50). Dipakai karena Next.js standalone
    # punya bug serve file di /public yg ditambah runtime — return 404. Nginx
    # serve langsung dari filesystem, tidak ada caching issue.
    image: nginx:alpine
    container_name: hulao-uploads
    volumes:
      - ./public/uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - traefik-public
      - internal
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hulao-uploads.rule=Host(`hulao.id`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.hulao-uploads.entrypoints=websecure"
      - "traefik.http.routers.hulao-uploads.tls=true"
      - "traefik.http.routers.hulao-uploads.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hulao-uploads.priority=200"
      - "traefik.http.services.hulao-uploads.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"

  bank-scraper:
    # Puppeteer + Chromium service untuk Bank Mutation Auto-Reader (BETA,
    # 2026-05-08). Hanya akses dari Next.js via internal network, TIDAK
    # ekspos port public. Memori dibatasi 1G karena Chromium boros.
    # Profile "beta" — service ini di-pause 2026-05-08 untuk hemat ~2GB disk
    # (image Chromium). Hidupkan ulang dgn `docker compose --profile beta up -d --build bank-scraper`.
    profiles: ["beta"]
    build:
      context: ./bank-scraper
      dockerfile: Dockerfile
    container_name: hulao-bank-scraper
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NEXTJS_URL=http://nextjs:3000
      - PORT=3002
    volumes:
      # Screenshot debug + cookie session storage (sessions tidak strict
      # diperlukan karena cookie disimpan di DB, tapi handy untuk debug).
      - ./bank-scraper/screenshots:/app/screenshots
      - ./bank-scraper/sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    # Chromium butuh shm size yang lebih besar dari default Docker (64MB).
    shm_size: '512mb'

volumes:
  # Data Postgres — managed volume supaya permission-nya benar (postgres user
  # dalam container = uid 70 di alpine image).
  hulao-postgres-data:

secrets:
  # Password Postgres dibaca dari file supaya tidak terlihat di `docker inspect`
  # atau crash log. File-nya 0600 di host, hanya dibaca compose.
  postgres_password:
    file: ./secrets/postgres_password

networks:
  traefik-public:
    external: true
  internal:
    driver: bridge
