      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ea6c0a"/>
    </linearGradient>
  </defs>
  <!-- Bubble: rounded square + ekor kiri-bawah -->
  <path fill="url(#g)" d="M16 3h32c7.2 0 13 5.8 13 13v24c0 7.2-5.8 13-13 13H26L10 61l3.2-9.4C7.3 49.7 3 44.4 3 38V16C3 8.8 8.8 3 16 3Z"/>
