server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    sendfile on;
    tcp_nopush on;
    aio threads;

    # File uploads pakai nama content-addressed (hex/cuid) → konten tak pernah
    # berubah untuk nama yang sama. Cache lama + immutable supaya video host
    # (scene/clip) di live room TIDAK di-download ulang tiap loop/scene change.
    location /uploads/ {
        root /usr/share/nginx/html;
        # Range request aktif default (penting utuk seek/streaming video).
        location ~* \.(mp4|webm|mov|m4a|mp3|jpg|jpeg|png|webp|gif|svg)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
